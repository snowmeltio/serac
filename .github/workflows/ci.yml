name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    name: verify
    # macOS, not ubuntu: usageProvider.ts gates Keychain token lookups on
    # process.platform === 'darwin', and its tests only exercise their mocks
    # on that path. Matches the actual dev/target environment (live usage is
    # currently macOS-only by design — see PR #17). Follow-up: make the
    # suite platform-independent (mock process.platform) so CI isn't pinned
    # to a specific OS as more cross-platform work lands.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
